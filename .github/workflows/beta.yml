name: Beta Build

on:
  push:
    branches: [beta]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: rm package-lock.json && npm install
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: rm package-lock.json && npm install

      - name: Build Vite + Electron
        run: npx vite build

      - name: Package with electron-builder
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: beta-${{ matrix.platform }}
          path: |
            out/*.AppImage
            out/*.zip
            out/*.exe
          if-no-files-found: warn
