<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TCG Tournament</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
.header{background:#1e40af;color:#fff;padding:12px 16px;font-size:18px;font-weight:700;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.header button{background:none;border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer}
.container{padding:12px}
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e2e8f0}
.card h3{font-size:16px;margin-bottom:4px}
.card .meta{font-size:13px;color:#64748b}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-active{background:#dcfce7;color:#166534}
.badge-reg{background:#dbeafe;color:#1e40af}
.badge-done{background:#f1f5f9;color:#64748b}
.tabs{display:flex;gap:2px;border-bottom:2px solid #e2e8f0;margin-bottom:12px;overflow-x:auto}
.tab{padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;color:#64748b}
.tab.active{color:#1e40af;border-bottom-color:#1e40af}
.match{display:flex;align-items:center;justify-content:space-between;padding:10px;background:#fff;border-radius:8px;margin-bottom:8px;border:1px solid #e2e8f0}
.match .table-num{font-size:12px;font-weight:700;color:#94a3b8;min-width:40px}
.match .names{flex:1;font-size:14px;font-weight:500}
.match .score{font-size:12px;color:#64748b;font-weight:600}
.result-btns{display:flex;gap:6px;margin-top:8px}
.result-btns button{flex:1;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:#fff}
.result-btns button.selected{background:#1e40af;color:#fff;border-color:#1e40af}
.result-btns button:active{opacity:.7}
.game-inputs{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:12px;color:#64748b}
.game-inputs input{width:36px;text-align:center;border:1px solid #e2e8f0;border-radius:4px;padding:4px;font-size:13px}
input[type=text],textarea{width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;margin-bottom:8px}
textarea{min-height:120px;font-family:monospace;font-size:13px}
button.primary{width:100%;padding:10px;background:#1e40af;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
button.primary:disabled{opacity:.5}
button.primary:active{opacity:.8}
.standings-table{width:100%;font-size:12px;border-collapse:collapse}
.standings-table th{text-align:left;padding:6px 8px;background:#f1f5f9;font-weight:600;color:#64748b;position:sticky;top:0}
.standings-table td{padding:6px 8px;border-bottom:1px solid #f1f5f9}
.standings-table tr:nth-child(even){background:#f8fafc}
.timer-bar{background:#0f172a;color:#fff;text-align:center;padding:6px;font-family:monospace;font-size:16px;font-weight:700}
.timer-bar.warning{background:#d97706}
.timer-bar.danger{background:#dc2626}
.timer-bar.expired{background:#dc2626;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.6}}
.filter{margin-bottom:10px}
.filter input{padding:8px 12px}
.status-bar{text-align:center;padding:4px;font-size:11px;color:#94a3b8}
.disconnected{background:#fef2f2;color:#dc2626;text-align:center;padding:8px;font-size:13px;font-weight:600}
select{width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;margin-bottom:8px;background:#fff}
</style>
</head>
<body>
<div id="app"></div>
<script>
const i18n={
  en:{tournaments:'Tournaments',pairings:'Pairings',standings:'Standings',register:'Register',decklist:'Decklist',
    table:'Table',bye:'Bye',vs:'vs',round:'Round',pending:'Pending',draw:'Draw',
    playerName:'Your name',submit:'Submit',games:'Games',noTournaments:'No active tournaments',
    registered:'Registered!',resultSent:'Result submitted!',enterName:'Enter name...',
    registration:'Registration',in_progress:'In Progress',top_cut:'Top Cut',completed:'Completed',
    rank:'#',player:'Player',points:'Pts',w:'W',l:'L',d:'D',omw:'OMW%',
    selectPlayer:'Select player...',pasteDecklist:'Paste decklist (e.g. 3x Card Name)',
    decklistSaved:'Decklist saved!',filter:'Filter by name...',disconnected:'Disconnected — reconnecting...'},
  de:{tournaments:'Turniere',pairings:'Paarungen',standings:'Rangliste',register:'Registrieren',decklist:'Deckliste',
    table:'Tisch',bye:'Freilos',vs:'vs',round:'Runde',pending:'Ausstehend',draw:'Unentschieden',
    playerName:'Dein Name',submit:'Absenden',games:'Spiele',noTournaments:'Keine aktiven Turniere',
    registered:'Registriert!',resultSent:'Ergebnis gesendet!',enterName:'Name eingeben...',
    registration:'Registrierung',in_progress:'Läuft',top_cut:'Top Cut',completed:'Beendet',
    rank:'#',player:'Spieler',points:'Pkt',w:'S',l:'N',d:'U',omw:'OMW%',
    selectPlayer:'Spieler wählen...',pasteDecklist:'Deckliste einfügen (z.B. 3x Kartenname)',
    decklistSaved:'Deckliste gespeichert!',filter:'Nach Name filtern...',disconnected:'Verbindung verloren — verbinde neu...'}
};
let lang=localStorage.getItem('tcg-lang')||'de';
const t=k=>i18n[lang][k]||k;
let state=null,timers=null,currentView='list',currentTournamentId=null,activeTab='pairings';

const app=document.getElementById('app');
const API=window.location.origin;
let evtSource=null;

async function fetchJSON(url,opts){const r=await fetch(API+url,{headers:{'Content-Type':'application/json'},...opts});return r.json()}

function connectSSE(){
  if(evtSource)evtSource.close();
  evtSource=new EventSource(API+'/api/events');
  evtSource.onmessage=e=>{const d=JSON.parse(e.data);if(d.type==='state'){state=d.state;timers=d.timers}else if(d.type==='timers'){timers=d.timers}render()};
  evtSource.onerror=()=>{};
}

async function init(){
  try{const d=await fetchJSON('/api/state');state=d.state;timers=d.timers}catch(e){}
  connectSSE();
  window.addEventListener('hashchange',onHash);
  onHash();
}

function onHash(){
  const h=location.hash||'#/';
  const m=h.match(/#\/tournament\/(.+)/);
  if(m){currentView='tournament';currentTournamentId=m[1]}
  else{currentView='list';currentTournamentId=null}
  render();
}

function render(){
  if(!state){app.innerHTML=`<div class="header">TCG Tournament<button onclick="toggleLang()">${lang.toUpperCase()}</button></div><div class="container"><p>${t('noTournaments')}</p></div>`;return}
  if(currentView==='tournament')renderTournament();
  else renderList();
}

function renderList(){
  const ts=Object.values(state.tournaments).filter(t=>t.status!=='completed');
  const statusBadge=s=>s==='registration'?'badge-reg':s==='completed'?'badge-done':'badge-active';
  app.innerHTML=`<div class="header">TCG Tournament<button onclick="toggleLang()">${lang.toUpperCase()}</button></div>
    <div class="container">${ts.length===0?`<p>${t('noTournaments')}</p>`:ts.map(t=>`
      <div class="card" onclick="location.hash='#/tournament/${t.id}'" style="cursor:pointer">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <h3>${esc(t.name)}</h3>
          <span class="badge ${statusBadge(t.status)}">${i18n[lang][t.status]||t.status}</span>
        </div>
        <div class="meta">${t.players.length} ${t('player')} · ${t('round')} ${t.currentRound}/${t.totalRounds}</div>
      </div>`).join('')}</div>`;
}

function renderTournament(){
  const tour=state.tournaments[currentTournamentId];
  if(!tour){app.innerHTML='<p>Not found</p>';return}
  const isReg=tour.status==='registration';
  const tabs=[{key:'pairings',label:t('pairings'),show:!isReg},{key:'standings',label:t('standings'),show:!isReg},{key:'register',label:t('register'),show:isReg},{key:'decklist',label:t('decklist'),show:isReg}];
  if(isReg&&activeTab!=='register'&&activeTab!=='decklist')activeTab='register';
  if(!isReg&&(activeTab==='register'||activeTab==='decklist'))activeTab='pairings';

  const timerHtml=renderTimer(tour);
  app.innerHTML=`${timerHtml}<div class="header"><span onclick="location.hash='#/'" style="cursor:pointer">← ${esc(tour.name)}</span><button onclick="toggleLang()">${lang.toUpperCase()}</button></div>
    <div class="container">
      <div class="tabs">${tabs.filter(t=>t.show).map(t=>`<div class="tab ${activeTab===t.key?'active':''}" onclick="setTab('${t.key}')">${t.label}</div>`).join('')}</div>
      <div id="tab-content"></div>
    </div>`;
  const tc=document.getElementById('tab-content');
  if(activeTab==='pairings')renderPairings(tc,tour);
  else if(activeTab==='standings')renderStandings(tc,tour);
  else if(activeTab==='register')renderRegister(tc,tour);
  else if(activeTab==='decklist')renderDecklist(tc,tour);
}

function renderTimer(tour){
  if(!timers||tour.status==='registration'||tour.status==='completed')return'';
  const tm=timers[tour.id];
  if(!tm)return'';
  let rem=tm.remainingSeconds;
  if(tm.isRunning&&tm.endTimestamp)rem=Math.max(0,Math.ceil((tm.endTimestamp-Date.now())/1000));
  const cls=rem<=0?'expired':rem<=60?'danger':rem<=300?'warning':'';
  const mm=String(Math.floor(rem/60)).padStart(2,'0');
  const ss=String(rem%60).padStart(2,'0');
  return`<div class="timer-bar ${cls}">${mm}:${ss}</div>`;
}

function renderPairings(el,tour){
  const round=tour.rounds[tour.rounds.length-1];
  if(!round){el.innerHTML='<p>—</p>';return}
  const getName=id=>tour.players.find(p=>p.id===id)?.name||'?';
  el.innerHTML=`<div class="filter"><input type="text" id="pfilter" placeholder="${t('filter')}" oninput="render()"></div>
    <div id="matches"></div>`;
  const filter=(document.getElementById('pfilter')?.value||'').toLowerCase();
  const mc=document.getElementById('matches');
  mc.innerHTML=round.matches.filter(m=>{
    if(!filter)return true;
    return getName(m.player1Id).toLowerCase().includes(filter)||(m.player2Id&&getName(m.player2Id).toLowerCase().includes(filter));
  }).map(m=>{
    if(m.isBye)return`<div class="match"><span class="table-num">—</span><span class="names">${esc(getName(m.player1Id))} <span class="badge badge-reg">${t('bye')}</span></span></div>`;
    const gs=m.player1Games!==undefined?`<span class="score">${m.player1Games}-${m.player2Games}</span>`:'';
    const resultBadge=m.result==='pending'?`<span class="badge badge-reg">${t('pending')}</span>`:m.result==='draw'?`<span class="badge" style="background:#fef3c7;color:#92400e">${t('draw')}</span>`:m.result==='player1_win'?`<span class="badge badge-active">${esc(getName(m.player1Id))}</span>`:`<span class="badge badge-active">${esc(getName(m.player2Id))}</span>`;
    const btns=(!round.isComplete&&m.result!=='pending'?'':!round.isComplete)?`
      <div class="game-inputs">${t('games')}: <input type="number" min="0" max="9" id="g1-${m.id}" value="${m.player1Games??''}" placeholder="0"> - <input type="number" min="0" max="9" id="g2-${m.id}" value="${m.player2Games??''}" placeholder="0"></div>
      <div class="result-btns">
        <button class="${m.result==='player1_win'?'selected':''}" onclick="submitResult('${tour.id}','${m.id}','player1_win')">${esc(getName(m.player1Id))}</button>
        <button class="${m.result==='draw'?'selected':''}" onclick="submitResult('${tour.id}','${m.id}','draw')">${t('draw')}</button>
        <button class="${m.result==='player2_win'?'selected':''}" onclick="submitResult('${tour.id}','${m.id}','player2_win')">${esc(getName(m.player2Id))}</button>
      </div>`:'';
    return`<div class="card"><div class="match" style="border:none;padding:0;margin:0;box-shadow:none"><span class="table-num">${t('table')} ${m.tableNumber}</span><span class="names">${esc(getName(m.player1Id))} ${gs} ${t('vs')} ${esc(getName(m.player2Id))}</span>${resultBadge}</div>${btns}</div>`;
  }).join('');
}

function renderStandings(el,tour){
  fetchJSON(`/api/tournaments/${tour.id}`).then(d=>{
    if(!d.standings)return;
    el.innerHTML=`<table class="standings-table"><thead><tr><th>${t('rank')}</th><th>${t('player')}</th><th>${t('points')}</th><th>${t('w')}</th><th>${t('l')}</th><th>${t('d')}</th><th>${t('omw')}</th></tr></thead><tbody>${d.standings.map(s=>`<tr${s.dropped?' style="opacity:.5"':''}><td>${s.rank}</td><td>${esc(s.playerName)}</td><td><b>${s.matchPoints}</b></td><td>${s.wins}</td><td>${s.losses}</td><td>${s.draws}</td><td>${(s.opponentMatchWinPct*100).toFixed(1)}%</td></tr>`).join('')}</tbody></table>`;
  });
}

function renderRegister(el,tour){
  el.innerHTML=`<input type="text" id="regname" placeholder="${t('enterName')}">
    <button class="primary" onclick="doRegister('${tour.id}')">${t('register')}</button>
    <div id="reg-msg" style="margin-top:8px;font-size:13px;color:#16a34a"></div>
    <div style="margin-top:12px"><p class="meta">${tour.players.length} ${t('player')}</p></div>`;
}

function renderDecklist(el,tour){
  const opts=tour.players.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  el.innerHTML=`<select id="dl-player"><option value="">${t('selectPlayer')}</option>${opts}</select>
    <textarea id="dl-text" placeholder="${t('pasteDecklist')}"></textarea>
    <button class="primary" onclick="doDecklist('${tour.id}')">${t('submit')}</button>
    <div id="dl-msg" style="margin-top:8px;font-size:13px;color:#16a34a"></div>`;
}

async function submitResult(tid,mid,result){
  const g1=document.getElementById('g1-'+mid)?.value;
  const g2=document.getElementById('g2-'+mid)?.value;
  const body={result};
  if(g1!==''&&g2!==''){body.player1Games=parseInt(g1);body.player2Games=parseInt(g2)}
  await fetchJSON(`/api/tournaments/${tid}/matches/${mid}/result`,{method:'POST',body:JSON.stringify(body)});
}

async function doRegister(tid){
  const name=document.getElementById('regname')?.value?.trim();
  if(!name)return;
  await fetchJSON(`/api/tournaments/${tid}/register`,{method:'POST',body:JSON.stringify({playerName:name})});
  document.getElementById('regname').value='';
  document.getElementById('reg-msg').textContent=t('registered');
}

async function doDecklist(tid){
  const pid=document.getElementById('dl-player')?.value;
  const text=document.getElementById('dl-text')?.value;
  if(!pid||!text)return;
  await fetchJSON(`/api/tournaments/${tid}/players/${pid}/decklist`,{method:'POST',body:JSON.stringify({decklistText:text})});
  document.getElementById('dl-msg').textContent=t('decklistSaved');
}

function setTab(key){activeTab=key;render()}
function toggleLang(){lang=lang==='de'?'en':'de';localStorage.setItem('tcg-lang',lang);render()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

init();
setInterval(()=>{if(currentView==='tournament')render()},1000);
</script>
</body>
</html>
