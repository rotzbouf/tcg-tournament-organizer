<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TCG Tournament</title>
<style>
:root{--bg:#f8fafc;--card:#fff;--fg:#1e293b;--fg2:#64748b;--fg3:#475569;--fg-muted:#94a3b8;--bd:#e2e8f0;--bd-subtle:#f1f5f9;--accent:#1e40af;--success-bg:#dcfce7;--success-fg:#166534;--info-bg:#dbeafe;--my-match-bg:#eff6ff;--input-bg:#fff}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--card:#1e293b;--fg:#f1f5f9;--fg2:#94a3b8;--fg3:#cbd5e1;--fg-muted:#64748b;--bd:#334155;--bd-subtle:#1e293b;--accent:#3b82f6;--success-bg:#14532d;--success-fg:#86efac;--info-bg:#1e3a5f;--my-match-bg:#1e3a5f;--input-bg:#1e293b}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
.header{background:var(--accent);color:#fff;padding:12px 16px;font-size:18px;font-weight:700;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.header button{background:none;border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer}
.container{padding:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-active{background:var(--success-bg);color:var(--success-fg)}
.badge-reg{background:var(--info-bg);color:var(--accent)}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--bd);margin-bottom:12px;overflow-x:auto}
.tab{padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;color:var(--fg2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.match{padding:10px;background:var(--card);border-radius:8px;margin-bottom:8px;border:1px solid var(--bd)}
.match-header{display:flex;align-items:center;justify-content:space-between}
.match .table-num{font-size:20px;font-weight:800;color:var(--accent);min-width:50px;text-align:center}
.match .names{flex:1;font-size:14px;font-weight:500}
.match .score{font-size:13px;color:var(--fg2);font-weight:600;margin:0 6px}
input[type=text],input[type=date],textarea{width:100%;padding:10px;border:1px solid var(--bd);border-radius:8px;font-size:14px;margin-bottom:8px;background:var(--input-bg);color:var(--fg)}
textarea{min-height:120px;font-family:monospace;font-size:13px}
button.primary{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
button.primary:disabled{opacity:.5}
button.primary:active{opacity:.8}
button.secondary{width:100%;padding:10px;background:var(--card);color:var(--accent);border:1px solid var(--accent);border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
button.judge{width:100%;padding:14px;background:#dc2626;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px}
button.judge:active{opacity:.8}
button.judge:disabled{opacity:.5}
.standings-table{width:100%;font-size:12px;border-collapse:collapse}
.standings-table th{text-align:left;padding:6px 8px;background:var(--bd-subtle);font-weight:600;color:var(--fg2)}
.standings-table td{padding:6px 8px;border-bottom:1px solid var(--bd-subtle)}
.timer-bar{background:#0f172a;color:#fff;text-align:center;padding:8px;font-family:monospace;font-size:20px;font-weight:700}
.timer-bar.warn{background:#d97706}
.timer-bar.danger{background:#dc2626}
.timer-bar.expired{background:#dc2626;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.6}}
.msg{text-align:center;padding:8px;font-size:13px;color:#16a34a;font-weight:500}
.filter input{width:100%;padding:8px 12px;border:1px solid var(--bd);border-radius:8px;font-size:14px;margin-bottom:10px;background:var(--input-bg);color:var(--fg)}
.reg-done{background:var(--success-bg);border:1px solid var(--success-fg);border-radius:10px;padding:14px;margin-bottom:12px}
.reg-done .name{font-size:16px;font-weight:700;color:var(--success-fg);text-align:center}
.reg-done .details{font-size:12px;color:var(--fg2);margin-top:6px}
.reg-done .details span{display:block;margin-top:2px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--fg3);margin-bottom:4px}
.form-row{display:flex;gap:8px}
.form-row>*{flex:1}
.form-group{margin-bottom:4px}
.optional{font-weight:400;color:var(--fg-muted);font-size:11px}
.my-match{border:2px solid var(--accent);background:var(--my-match-bg)}
</style>
</head>
<body>
<div id="timer-root"></div>
<div id="app"></div>
<script>
const T={
  en:{pairings:'Pairings',standings:'Standings',register:'Register',
    table:'T',bye:'Bye',vs:'vs',round:'Round',pending:'Pending',draw:'Draw',
    games:'Games',noData:'Loading...',
    rank:'#',player:'Player',points:'Pts',w:'W',l:'L',d:'D',omw:'OMW%',
    registeredAs:'Registered as',decklist:'Decklist',submit:'Submit',
    pasteDecklist:'Paste decklist (e.g. 3x Card Name)',
    decklistSaved:'Saved!',filter:'Filter by name...',
    firstName:'First Name',lastName:'Last Name',
    dateOfBirth:'Date of Birth',playerId:'Player ID',
    optional:'optional',playerCount:'Players',
    callJudge:'Call Judge',judgeCalled:'Judge has been called!',
    reportToTO:'Report results to the Tournament Organizer',
    dropOut:'Drop from tournament',dropConfirm:'Are you sure you want to drop? This cannot be undone.',dropped:'You have dropped from the tournament.',
    noDecklists:'No decklists available',cards:'cards',
    reportResult:'Report Result',iWon:'I won',opponentWon:'Opponent won',itsDraw:'Draw',
    resultReported:'Result reported — waiting for TO confirmation.',reportError:'Error reporting result.'},
  de:{pairings:'Paarungen',standings:'Rangliste',register:'Registrieren',
    table:'T',bye:'Freilos',vs:'vs',round:'Runde',pending:'Ausstehend',draw:'Unentschieden',
    games:'Spiele',noData:'Laden...',
    rank:'#',player:'Spieler',points:'Pkt',w:'S',l:'N',d:'U',omw:'OMW%',
    registeredAs:'Registriert als',decklist:'Deckliste',submit:'Absenden',
    pasteDecklist:'Deckliste (z.B. 3x Kartenname)',
    decklistSaved:'Gespeichert!',filter:'Nach Name filtern...',
    firstName:'Vorname',lastName:'Nachname',
    dateOfBirth:'Geburtsdatum',playerId:'Spieler-ID',
    optional:'optional',playerCount:'Spieler',
    callJudge:'Judge rufen',judgeCalled:'Judge wurde gerufen!',
    reportToTO:'Ergebnisse beim Turnierleiter melden',
    dropOut:'Vom Turnier abmelden',dropConfirm:'Bist du sicher? Dies kann nicht rückgängig gemacht werden.',dropped:'Du hast das Turnier verlassen.',
    noDecklists:'Keine Decklisten verfügbar',cards:'Karten',
    reportResult:'Ergebnis melden',iWon:'Ich habe gewonnen',opponentWon:'Gegner hat gewonnen',itsDraw:'Unentschieden',
    resultReported:'Ergebnis gemeldet — TO bestätigt noch.',reportError:'Fehler beim Melden.'}
};
let lang=localStorage.getItem('tcg-lang')||'de';
const t=k=>T[lang][k]||k;
let tournament=null,standings=null,timers=null,activeTab='pairings',boundTournamentId=null;
let timerAlerted=false,pendingVibration=false;
let session=JSON.parse(localStorage.getItem('tcg-session')||'null');
let needsFullRender=true;
const app=document.getElementById('app');
const timerRoot=document.getElementById('timer-root');
const API=location.origin;

async function post(url,body){return fetch(API+url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json())}

function connectSSE(){
  const es=new EventSource(API+'/api/events');
  es.onmessage=e=>{try{const d=JSON.parse(e.data);if(d.timers)timers=d.timers;if(d.state){loadFromState(d.state);needsFullRender=true}}catch{}};
}

function loadFromState(state){
  if(!state||!state.tournaments)return;
  if(boundTournamentId&&state.tournaments[boundTournamentId]){
    tournament=state.tournaments[boundTournamentId];
  }else{
    const ids=Object.keys(state.tournaments);
    if(ids.length>0)tournament=state.tournaments[ids[0]];
  }
}

async function init(){
  try{
    const d=await fetch(API+'/api/tournament').then(r=>r.json());
    if(d.tournament){tournament=d.tournament;boundTournamentId=d.tournament.id}
    if(d.standings)standings=d.standings;
    if(d.timers)timers=d.timers;
  }catch{}
  connectSSE();
  needsFullRender=true;
  renderLoop();
}

function renderLoop(){
  if(needsFullRender){render();needsFullRender=false}
  updateTimer();
  requestAnimationFrame(renderLoop);
}

function isRegistered(){
  if(!session||!tournament)return false;
  return tournament.players.some(p=>p.name.toLowerCase()===session.fullName.toLowerCase());
}

function render(){
  if(!tournament){app.innerHTML=`<div class="header">TCG Tournament<button onclick="toggleLang()">${lang.toUpperCase()}</button></div><div class="container"><p>${t('noData')}</p></div>`;return}
  const isReg=tournament.status==='registration';
  const registered=isRegistered();
  if(isReg&&!registered&&activeTab!=='register')activeTab='register';
  if(!isReg&&activeTab==='register')activeTab='pairings';
  const showDecklists=tournament.decklistVisibility==='public'&&!isReg;
  const tabs=[{k:'pairings',l:t('pairings'),s:!isReg||registered},{k:'standings',l:t('standings'),s:!isReg||registered},{k:'decklists',l:t('decklist'),s:showDecklists},{k:'register',l:t('register'),s:isReg}];
  app.innerHTML=`<div class="header"><span>${esc(tournament.name)}</span><button onclick="toggleLang()">${lang.toUpperCase()}</button></div>
    <div class="container">
      <div class="tabs">${tabs.filter(x=>x.s).map(x=>`<div class="tab ${activeTab===x.k?'active':''}" onclick="setTab('${x.k}')">${x.l}</div>`).join('')}</div>
      <div id="tc"></div>
    </div>`;
  const tc=document.getElementById('tc');
  if(activeTab==='pairings')renderPairings(tc);
  else if(activeTab==='standings')renderStandings(tc);
  else if(activeTab==='decklists')renderDecklists(tc);
  else if(activeTab==='register')renderRegister(tc);
}

function doVibrate(){
  if(document.hidden){pendingVibration=true;return}
  pendingVibration=false;
  if(navigator.vibrate)navigator.vibrate([500,200,500,200,500]);
}
function playMobileAlarm(){
  try{
    const ctx=new AudioContext();
    if(ctx.state==='suspended')ctx.resume().catch(()=>{});
    const now=ctx.currentTime;
    for(let i=0;i<3;i++){const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;o.type='square';g.gain.value=0.15;o.start(now+i*0.3);o.stop(now+i*0.3+0.2)}
  }catch{}
  doVibrate();
}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&pendingVibration)doVibrate()});

function updateTimer(){
  if(!timers||!tournament||tournament.status==='registration'||tournament.status==='completed'){timerRoot.innerHTML='';timerAlerted=false;pendingVibration=false;return}
  const tm=timers[tournament.id];if(!tm){timerRoot.innerHTML='';timerAlerted=false;pendingVibration=false;return}
  let rem=tm.remainingSeconds;
  if(tm.isRunning&&tm.endTimestamp)rem=Math.max(0,Math.ceil((tm.endTimestamp-Date.now())/1000));
  if(rem===0&&!timerAlerted){timerAlerted=true;playMobileAlarm()}
  if(rem>0){timerAlerted=false;pendingVibration=false;}
  const cls=rem<=0?'expired':rem<=60?'danger':rem<=300?'warn':'';
  const str=`${String(Math.floor(rem/60)).padStart(2,'0')}:${String(rem%60).padStart(2,'0')}`;
  if(timerRoot.dataset.last===str)return;
  timerRoot.dataset.last=str;
  timerRoot.innerHTML=`<div class="timer-bar ${cls}">${str}</div>`;
}

function getMyMatch(){
  if(!session||!tournament)return null;
  const round=tournament.rounds[tournament.rounds.length-1];
  if(!round||round.isComplete)return null;
  const me=tournament.players.find(p=>p.name.toLowerCase()===session.fullName.toLowerCase());
  if(!me)return null;
  const match=round.matches.find(m=>!m.isBye&&(m.player1Id===me.id||m.player2Id===me.id));
  return match?{match,playerId:me.id,playerName:me.name}:null;
}

function getMyPlayer(){
  if(!session||!tournament)return null;
  return tournament.players.find(p=>p.name.toLowerCase()===session.fullName.toLowerCase())||null;
}

function renderPairings(el){
  const round=tournament.rounds[tournament.rounds.length-1];
  if(!round){el.innerHTML='<p>—</p>';return}
  el.innerHTML=`<div class="filter"><input type="text" id="pf" placeholder="${t('filter')}" oninput="filterPairings()"></div><div id="ml"></div>
    <p style="margin-top:12px;text-align:center;font-size:12px;color:#94a3b8">${t('reportToTO')}</p>
    <div id="jc"></div>`;
  filterPairings();
  renderJudgeButton();
}

function filterPairings(){
  const round=tournament.rounds[tournament.rounds.length-1];if(!round)return;
  const gn=id=>tournament.players.find(p=>p.id===id)?.name||'?';
  const f=(document.getElementById('pf')?.value||'').toLowerCase();
  const myInfo=getMyMatch();
  const ml=document.getElementById('ml');if(!ml)return;
  ml.innerHTML=round.matches.filter(m=>{
    if(!f)return true;return gn(m.player1Id).toLowerCase().includes(f)||(m.player2Id&&gn(m.player2Id).toLowerCase().includes(f));
  }).map(m=>{
    if(m.isBye)return`<div class="match"><div class="match-header"><span class="table-num">—</span><span class="names">${esc(gn(m.player1Id))}</span><span class="badge badge-reg">${t('bye')}</span></div></div>`;
    const gs=m.player1Games!=null?`<span class="score">${m.player1Games}-${m.player2Games}</span>`:'';
    const rb=m.result==='pending'?`<span class="badge badge-reg">${t('pending')}</span>`:m.result==='draw'?`<span class="badge" style="background:#fef3c7;color:#92400e">${t('draw')}</span>`:`<span class="badge badge-active">${esc(gn(m.result==='player1_win'?m.player1Id:m.player2Id))}</span>`;
    const isMyMatch=myInfo&&m.id===myInfo.match.id;
    return`<div class="match${isMyMatch?' my-match':''}"><div class="match-header"><span class="table-num">${t('table')}${m.tableNumber}</span><span class="names">${esc(gn(m.player1Id))} ${gs} ${t('vs')} ${esc(gn(m.player2Id))}</span>${rb}</div></div>`;
  }).join('');
}

function renderJudgeButton(){
  const jc=document.getElementById('jc');if(!jc)return;
  const myInfo=getMyMatch();
  if(!myInfo){jc.innerHTML='';return}
  const match=myInfo.match;
  const isPending=match.result==='pending';
  jc.innerHTML=`
    ${isPending?`<div style="margin-top:12px">
      <p style="font-size:12px;color:var(--fg2);margin-bottom:8px;text-align:center">${t('reportResult')}</p>
      <div style="display:flex;gap:8px">
        <button class="primary" style="flex:1;padding:10px;font-size:13px" onclick="reportResult('${match.id}','${myInfo.playerId===match.player1Id?'player1_win':'player2_win'}')">${t('iWon')}</button>
        <button class="secondary" style="flex:1;padding:10px;font-size:13px;margin:0" onclick="reportResult('${match.id}','${myInfo.playerId===match.player1Id?'player2_win':'player1_win'}')">${t('opponentWon')}</button>
      </div>
      <button class="secondary" style="margin-top:6px;padding:8px;font-size:12px;color:var(--fg2);border-color:var(--bd)" onclick="reportResult('${match.id}','draw')">${t('itsDraw')}</button>
      <div id="rr" class="msg"></div>
    </div>`:''}
    <button class="judge" style="margin-top:8px" onclick="callJudge()">${t('callJudge')}</button>
    <div id="jm" class="msg"></div>`;
}

async function reportResult(matchId,result){
  const myInfo=getMyMatch();if(!myInfo)return;
  try{
    await post('/api/matches/'+matchId+'/report',{result,reporterName:myInfo.playerName});
    const rr=document.getElementById('rr');if(rr)rr.textContent=t('resultReported');
  }catch{
    const rr=document.getElementById('rr');if(rr)rr.textContent=t('reportError');
  }
}

function renderDropButton(){
  const dp=document.getElementById('dp');if(!dp)return;
  const me=getMyPlayer();
  if(!me||me.droppedInRound!==null){dp.innerHTML=me&&me.droppedInRound!==null?`<p style="margin-top:12px;text-align:center;font-size:13px;color:#dc2626;font-weight:600">${t('dropped')}</p>`:'';return}
  if(tournament.status!=='in_progress'&&tournament.status!=='top_cut'){dp.innerHTML='';return}
  dp.innerHTML=`<button class="secondary" style="margin-top:12px;color:#dc2626;border-color:#dc2626" onclick="doDrop('${me.id}')">${t('dropOut')}</button>`;
}

async function doDrop(playerId){
  if(!confirm(t('dropConfirm')))return;
  await post('/api/players/'+playerId+'/drop',{});
  needsFullRender=true;
}

function renderDecklists(el){
  fetch(API+'/api/decklists').then(r=>r.json()).then(d=>{
    if(!d.decklists||d.decklists.length===0){el.innerHTML=`<p style="text-align:center;color:#94a3b8">${t('noDecklists')}</p>`;return}
    el.innerHTML=d.decklists.map(dl=>{
      const cards=dl.decklist?dl.decklist.reduce((s,e)=>s+e.quantity,0):0;
      const list=dl.decklist?dl.decklist.map(e=>e.quantity+'x '+e.cardName).join('\n'):'';
      return`<div class="match" onclick="this.querySelector('pre').style.display=this.querySelector('pre').style.display==='none'?'block':'none'">
        <div class="match-header"><span class="names"><b>${esc(dl.name)}</b>${dl.deckName?' — '+esc(dl.deckName):''}</span><span style="font-size:12px;color:#94a3b8">${cards} ${t('cards')}</span></div>
        <pre style="display:none;margin-top:8px;font-size:12px;white-space:pre-wrap;color:#475569">${esc(list)}</pre>
      </div>`;
    }).join('');
  }).catch(()=>{el.innerHTML=`<p style="text-align:center;color:#94a3b8">${t('noDecklists')}</p>`});
}

function renderStandings(el){
  fetch(API+'/api/tournament').then(r=>r.json()).then(d=>{
    if(!d.standings)return;
    el.innerHTML=`<table class="standings-table"><thead><tr><th>${t('rank')}</th><th>${t('player')}</th><th>${t('points')}</th><th>${t('w')}</th><th>${t('l')}</th><th>${t('d')}</th><th>${t('omw')}</th></tr></thead><tbody>${d.standings.map(s=>`<tr${s.dropped?' style="opacity:.4"':''}><td>${s.rank}</td><td>${esc(s.playerName)}</td><td><b>${s.matchPoints}</b></td><td>${s.wins}</td><td>${s.losses}</td><td>${s.draws}</td><td>${(s.opponentMatchWinPct*100).toFixed(1)}%</td></tr>`).join('')}</tbody></table><div id="dp"></div>`;
    renderDropButton();
  });
}

function renderRegister(el){
  const fullName=session?session.fullName:'';
  const myPlayer=fullName?tournament.players.find(p=>p.name.toLowerCase()===fullName.toLowerCase()):null;

  if(myPlayer){
    const details=[];
    if(session.dateOfBirth)details.push(`${t('dateOfBirth')}: ${session.dateOfBirth}`);
    if(session.playerId)details.push(`${t('playerId')}: ${session.playerId}`);
    el.innerHTML=`
      <div class="reg-done">
        <div class="name">${t('registeredAs')}: ${esc(myPlayer.name)}</div>
        ${details.length?`<div class="details">${details.map(d=>`<span>${esc(d)}</span>`).join('')}</div>`:''}
      </div>
      <h3 style="font-size:14px;font-weight:600;margin-bottom:8px">${t('decklist')}</h3>
      <textarea id="dt" placeholder="${t('pasteDecklist')}">${myPlayer.decklist?myPlayer.decklist.map(e=>e.quantity+'x '+e.cardName).join('\n'):''}</textarea>
      <button class="primary" onclick="doDl('${myPlayer.id}')">${t('submit')}</button>
      <div id="dm" class="msg"></div>`;
    return;
  }

  el.innerHTML=`
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">${t('firstName')}</label>
        <input type="text" id="rf" placeholder="${t('firstName')}">
      </div>
      <div class="form-group">
        <label class="form-label">${t('lastName')}</label>
        <input type="text" id="rl" placeholder="${t('lastName')}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">${t('dateOfBirth')} <span class="optional">(${t('optional')})</span></label>
      <input type="date" id="rd">
    </div>
    <div class="form-group">
      <label class="form-label">${t('playerId')} <span class="optional">(${t('optional')})</span></label>
      <input type="text" id="rp" placeholder="${t('playerId')}">
    </div>
    <button class="primary" onclick="doReg()">${t('register')}</button>
    <div id="rm" class="msg"></div>
    <p style="margin-top:12px;font-size:13px;color:#64748b">${tournament.players.length} ${t('playerCount')}</p>`;
}

async function callJudge(){
  const myInfo=getMyMatch();if(!myInfo)return;
  const btn=document.querySelector('.judge');if(btn)btn.disabled=true;
  await post('/api/judge-call',{playerName:myInfo.playerName,tableNumber:myInfo.match.tableNumber});
  const jm=document.getElementById('jm');
  if(jm)jm.textContent=t('judgeCalled');
  setTimeout(()=>{if(btn)btn.disabled=false;if(jm)jm.textContent=''},5000);
}

async function doReg(){
  const fn=document.getElementById('rf')?.value?.trim();
  const ln=document.getElementById('rl')?.value?.trim();
  if(!fn||!ln){document.getElementById('rm').textContent=lang==='de'?'Vor- und Nachname erforderlich':'First and last name required';return}
  const dob=document.getElementById('rd')?.value||'';
  const pid=document.getElementById('rp')?.value?.trim()||'';
  const fullName=fn+' '+ln;
  const body={playerName:fullName};
  if(pid)body.playerId=pid;
  if(dob)body.dateOfBirth=dob;
  const res=await post('/api/register',body);
  if(res.ok){
    session={fullName,firstName:fn,lastName:ln,dateOfBirth:dob,playerId:pid};
    localStorage.setItem('tcg-session',JSON.stringify(session));
    needsFullRender=true;
  }
}

async function doDl(playerId){
  const txt=document.getElementById('dt')?.value;if(!txt)return;
  await post('/api/players/'+playerId+'/decklist',{decklistText:txt});
  document.getElementById('dm').textContent=t('decklistSaved');
}

function setTab(k){activeTab=k;needsFullRender=true}
function toggleLang(){lang=lang==='de'?'en':'de';localStorage.setItem('tcg-lang',lang);needsFullRender=true}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

init();
</script>
</body>
